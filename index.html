<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebApp Name</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  
  <!-- Base Styles -->
  <link rel="stylesheet" href="app/style.css" />
  
  <!-- Component Styles -->
  <link rel="stylesheet" href="app/components/header/header.css" />
  <link rel="stylesheet" href="app/components/sections/hero/hero.css" />
  <link rel="stylesheet" href="app/components/sections/profiles/profiles.css" />
  <link rel="stylesheet" href="app/components/sections/posts/posts.css" />
  <link rel="stylesheet" href="app/components/sections/footer/footer.css" />
</head>
<body>

  <!-- Component Data -->
  <script src="app/components/header/header_data.js"></script>
  <script src="app/components/sections/hero/hero_data.js"></script>
  <script src="app/components/sections/profiles/profiles_data.js"></script>
  <script src="app/components/sections/posts/posts_data.js"></script>
  <script src="app/components/sections/footer/footer_data.js"></script>

  <!-- Component Scripts -->
  <script src="app/components/header/header.js" defer></script>
  <script src="app/components/sections/hero/hero.js" defer></script>
  <script src="app/components/sections/profiles/profiles.js" defer></script>
  <script src="app/components/sections/posts/posts.js" defer></script>
  <script src="app/components/sections/footer/footer.js" defer></script>

  <!-- NAVBAR -->
  <nav class="navbar" id="navbar"></nav>

  <!-- SEARCH BAR -->
  <div class="search-bar" id="searchBar"></div>

  <!-- MAIN -->
  <div class="main">

    <!-- HERO ROW -->
    <div class="hero-row">
      <!-- LEFT: HERO BANNER -->
      <div class="hero-banner" id="heroBanner"></div>

      <!-- RIGHT: DEMO + REGISTER -->
      <div class="hero-right">
        <div class="demo-video" id="demoVideo"></div>
        <div class="register-card" id="registerCard"></div>
      </div>
    </div>

    <!-- SUGGESTED PROFILES -->
    <section class="profiles-section" aria-label="Suggested Profiles">
      <div class="profiles-header-row">
        <h2 class="section-header profiles-title">Suggested Profiles</h2>
      </div>
      <div class="profiles-slider-wrap">
        <button class="profiles-nav-btn prev" id="profilesPrevBtn" type="button" aria-label="Scroll profiles left">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M15 18l-6-6 6-6"></path>
          </svg>
        </button>
        <div class="profiles-grid" id="profilesGrid"></div>
        <button class="profiles-nav-btn next" id="profilesNextBtn" type="button" aria-label="Scroll profiles right">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M9 18l6-6-6-6"></path>
          </svg>
        </button>
      </div>
    </section>

    <!-- RECOMMENDED POSTS -->
    <div class="posts-header-row">
      <h2 class="section-header posts-title">Recommended Posts</h2>
    </div>
    <div class="posts-grid" id="postsGrid"></div>

  </div>

  <!-- FOOTER -->
  <div class="footer" id="footer"></div>

</body>
</html>
